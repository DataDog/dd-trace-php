schema-version: v1
ignore:
  - "appsec/build/"
  - "appsec/tests/"
  - "appsec/third_party/"
flags:
  helper-rust-unit:
    carryforward: true
  helper-rust-integration:
    carryforward: true
gates:
  - type: total_coverage_percentage
    config:
      threshold: auto
  - type: patch_coverage_percentage
    config:
      threshold: 90
