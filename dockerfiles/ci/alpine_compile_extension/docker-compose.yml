version: '3.7'

services:

  base-alpine:
    image: ${CI_REGISTRY_IMAGE:-datadog/dd-trace-ci}:php-compile-extension-alpine
    build:
      context: .
      dockerfile: base.Dockerfile
      x-bake: &bake
        platforms:
          - linux/arm64
          - linux/amd64
    volumes:
        - ../../:/app

  7.0-alpine:
    image: ${CI_REGISTRY_IMAGE:-datadog/dd-trace-ci}:php-compile-extension-alpine-7.0
    build:
      context: .
      x-bake: *bake
      args:
        phpVersion: 7.0.33
        phpSha256Hash: d71a6ecb6b13dc53fed7532a7f8f949c4044806f067502f8fb6f9facbb40452a
        phpApi: 20151012
    volumes:
        - ../../:/app

