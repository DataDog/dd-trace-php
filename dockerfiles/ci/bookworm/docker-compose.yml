version: '3.7'

services:

  base:
    image: datadog/dd-trace-ci:bookworm-$BOOKWORM_NEXT_VERSION
    build:
      context: .
      x-bake: &bake
        platforms:
          - linux/arm64
          - linux/amd64
      args: &build-base
        BUILD_BASE: datadog/dd-trace-ci:bookworm-$BOOKWORM_NEXT_VERSION
        MAKE_JOBS: ${MAKE_JOBS:-}

  php-8.5:
    image: datadog/dd-trace-ci:php-8.5_bookworm-$BOOKWORM_NEXT_VERSION
    build:
      context: .
      dockerfile: php-8.5/Dockerfile
      x-bake: *bake
      args:
        <<: *build-base
        phpVersion: "8.5"
        phpTarGzUrl: https://www.php.net/distributions/php-8.5.6.tar.gz
        phpSha256Hash: "169aaa21c2834b38df8e39169f43bc5bea8d4059a816cfbc59be08fc2bae60cd"

