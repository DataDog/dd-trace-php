version: '3.7'

services:

  base:
    image: datadog/dd-trace-ci:bookworm-$BOOKWORM_NEXT_VERSION
    build:
      context: .
      x-bake: &bake
        platforms:
          - linux/arm64
          - linux/amd64
      args: &build-base
        BUILD_BASE: datadog/dd-trace-ci:bookworm-$BOOKWORM_NEXT_VERSION
        MAKE_JOBS: ${MAKE_JOBS:-}

  php-8.5:
    image: datadog/dd-trace-ci:php-8.5_bookworm-$BOOKWORM_NEXT_VERSION
    build:
      context: .
      dockerfile: php-8.5/Dockerfile
      x-bake: *bake
      args:
        <<: *build-base
        phpVersion: "8.5"
        phpTarGzUrl: https://www.php.net/distributions/php-8.5.4.tar.gz
        phpSha256Hash: "4fef7f44eff3c18e329504cb0d3eb30b41cf54e2db05cb4ebe8b78fc37d38ce1"

