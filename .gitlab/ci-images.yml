Bookworm:
  stage: ci-build
  rules:
    - when: manual
      allow_failure: true
  needs: []
  tags: ["arch:amd64"]
  timeout: 4h
  image: 486234852809.dkr.ecr.us-east-1.amazonaws.com/docker:29.4.0-noble
  variables:
    DDCI_CONFIGURE_OTEL_EXPORTER: "true"
  parallel:
    matrix:
      - PHP_VERSION:
        - base
      - PHP_VERSION:
        - php-8.5
        - php-8.4
        - php-8.3
        - php-8.2
        - php-8.1
        - php-8.0
        - php-8.0-shared-ext
        - php-7.4
        - php-7.4-shared-ext
        - php-7.3
        - php-7.2
